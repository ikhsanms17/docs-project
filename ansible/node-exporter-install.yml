---
- name: Install Node Exporter on target servers
  hosts: workers
  become: yes
  vars:
    node_exporter_version: "1.6.1"
    node_exporter_user: "node_exporter"
    node_exporter_install_dir: "/usr/local/bin"
    node_exporter_service_path: "/etc/systemd/system/node_exporter.service"

  tasks:
    - name: Create node_exporter user
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        shell: /sbin/nologin

    - name: Download Node Exporter tarball
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: "0644"

    - name: Extract Node Exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: Copy node_exporter binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: "{{ node_exporter_install_dir }}/node_exporter"
        mode: "0755"
        remote_src: yes

    - name: Remove extracted files and archive
      ansible.builtin.file:
        path: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
        state: absent

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "/tmp/node_exporter.tar.gz"
        state: absent

    - name: Create systemd service file for node_exporter
      ansible.builtin.copy:
        dest: "{{ node_exporter_service_path }}"
        content: |
          [Unit]
          Description=Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ node_exporter_user }}
          ExecStart={{ node_exporter_install_dir }}/node_exporter

          [Install]
          WantedBy=default.target
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start node_exporter service
      ansible.builtin.systemd:
        name: node_exporter
        enabled: yes
        state: started
