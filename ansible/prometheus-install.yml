---
- name: Install Prometheus Monitoring Server
  hosts: workers
  become: yes

  vars:
    prometheus_version: "2.52.0"
    prometheus_user: "prometheus"
    prometheus_install_dir: "/opt/prometheus"
    prometheus_config_dir: "/etc/prometheus"
    prometheus_data_dir: "/var/lib/prometheus"

  tasks:
    - name: Create Prometheus user
      user:
        name: "{{ prometheus_user }}"
        shell: /sbin/nologin

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0755"
      loop:
        - "{{ prometheus_install_dir }}"
        - "{{ prometheus_config_dir }}"
        - "{{ prometheus_data_dir }}"

    - name: Download Prometheus tarball
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Move binaries
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: "0755"
      loop:
        - prometheus
        - promtool

    - name: Copy console files
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "{{ prometheus_install_dir }}/{{ item }}"
        remote_src: yes
      loop:
        - consoles
        - console_libraries

    - name: Copy Prometheus config
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus.yml"
        dest: "{{ prometheus_config_dir }}/prometheus.yml"
        remote_src: yes
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0644"

    - name: Create systemd unit file
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ prometheus_user }}
          Group={{ prometheus_user }}
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file={{ prometheus_config_dir }}/prometheus.yml \
            --storage.tsdb.path={{ prometheus_data_dir }} \
            --web.console.templates={{ prometheus_install_dir }}/consoles \
            --web.console.libraries={{ prometheus_install_dir }}/console_libraries

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: started

  handlers:
    - name: Reload systemd
      command: systemctl daemon-reexec
